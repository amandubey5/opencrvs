# Traefik Helm Chart values — Bare-metal single node + cert-manager TLS
#
# Traefik handles ingress and TLS termination.
# TLS certificates are issued by cert-manager (not Traefik ACME).
# The IngressClass is enabled so cert-manager's HTTP-01 solver can use it.
#
# DEPLOY:
#   helm upgrade --install traefik oci://ghcr.io/traefik/helm/traefik \
#     --namespace traefik \
#     --create-namespace \
#     -f traefik/values.yaml

namespaceOverride: "traefik"

logs:
  general:
    level: "INFO"
    format: "common"
  access:
    enabled: true

ingressRoute:
  dashboard:
    enabled: false

# Register Traefik as an IngressClass so cert-manager HTTP-01 solver can use it
ingressClass:
  enabled: true
  isDefaultClass: true

# Enable both: CRDs for OpenCRVS IngressRoutes, and vanilla Ingress for cert-manager HTTP-01
providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true   # required for cert-manager HTTP-01 challenge
  kubernetesGateway:
    enabled: false

service:
  type: ClusterIP   # bare-metal: access via hostPort below

deployment:
  replicas: 1

ports:
  web:
    port: 80
    hostPort: 80      # bind directly to node port 80
    redirectTo:
      port: websecure  # HTTP → HTTPS
  websecure:
    port: 443
    hostPort: 443     # bind directly to node port 443
    tls:
      enabled: true

persistence:
  enabled: false      # cert-manager manages certs, no ACME storage needed

tolerations: []
nodeSelector: {}
