# ==========================================
# Traefik Production Configuration
# Single Node On-Prem Deployment
# TLS handled by cert-manager
# ==========================================

namespaceOverride: "traefik"

deployment:
  replicas: 1
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9100"
  securityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532

service:
  # ClusterIP because hostPort exposes directly on node
  type: ClusterIP

logs:
  general:
    level: "INFO"
    format: "json"
  access:
    enabled: true

providers:
  kubernetesCRD:
    enabled: true
  kubernetesIngress:
    enabled: true
  kubernetesGateway:
    enabled: false

# Only keep arguments that are safe in v3
additionalArguments:
  - "--serversTransport.insecureSkipVerify=true"

ports:
  web:
    port: 8000
    exposedPort: 80
    hostPort: 80
    protocol: TCP
    http:
      redirections:
        entryPoint:
          to: websecure

  websecure:
    port: 8443
    exposedPort: 443
    hostPort: 443
    protocol: TCP
    asDefault: true

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

ingressRoute:
  dashboard:
    enabled: false

# No default certificate.
# cert-manager Certificates will be referenced per Ingress.
tlsStore: {}
