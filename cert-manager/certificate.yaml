---
# Certificate — all OpenCRVS subdomains
#
# cert-manager requests a TLS certificate for every subdomain listed below
# using the HTTP-01 challenge via Traefik. The resulting secret is stored
# in the `opencrvs-dev` namespace so Traefik can use it for IngressRoutes.
#
# IMPORTANT ORDER:
#   1. Apply this AFTER `opencrvs-dev` namespace exists (created by helm install --create-namespace)
#      OR pre-create the namespace: kubectl create namespace opencrvs-dev
#   2. Wait for certificate to be Ready before helm installing OpenCRVS services
#
# APPLY:
#   kubectl create namespace opencrvs-dev --dry-run=client -o yaml | kubectl apply -f -
#   kubectl apply -f cert-manager/certificate.yaml
#
# VERIFY (takes 1-3 minutes):
#   kubectl get certificate opencrvs-cert -n opencrvs-dev
#   # READY should be True
#   kubectl describe certificate opencrvs-cert -n opencrvs-dev
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: opencrvs-cert
  # Must be in the same namespace as the OpenCRVS IngressRoutes
  namespace: opencrvs-dev
spec:
  # Name of the Kubernetes Secret that stores the issued TLS certificate
  secretName: opencrvs-tls

  # Reference to the ClusterIssuer above
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer

  # All subdomains used by OpenCRVS (from IngressRoute templates)
  dnsNames:
    - opencrvs.com
    - login.opencrvs.com
    - register.opencrvs.com
    - auth.opencrvs.com
    - gateway.opencrvs.com
    - config.opencrvs.com
    - countryconfig.opencrvs.com
    - webhooks.opencrvs.com
    - events.opencrvs.com
    - minio.opencrvs.com
